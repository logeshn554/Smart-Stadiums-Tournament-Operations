##############################################################################
# StadiumOps AI — Docker Compose (Development / Single-Venue)
#
# Usage:
#   docker compose up --build
#
# Services:
#   api   — FastAPI backend (port 8000)
#   redis — Rate-limiter backend store (port 6379)
#
# Production note:
#   For multi-venue tournament deployments, scale the 'api' service
#   horizontally behind a load balancer.  Redis handles distributed
#   rate-limit counters automatically.
##############################################################################

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
